<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body align="center">

    <h1>Registration Form</h1>

    <form onsubmit="show(); return false;">

        <label>Name:</label>
        <input type="text" id="name" required>
        <br><br>

        <label>Email:</label>
        <input type="email" id="email" required>
        <br><br>

        <label>Password:</label>
        <input type="password" id="password" required>
        <br><br>

        <label>Phone:</label>
        <input type="tel" id="phone" required>
        <br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" value="Male">Male
        <input type="radio" name="gender" value="Female">Female
        <br><br>

        <label>Qualification:</label>
        <input type="checkbox" name="qualify" value="10th">10th
        <input type="checkbox" name="qualify" value="12th">12th
        <input type="checkbox" name="qualify" value="B.Tech">B.Tech
        <input type="checkbox" name="qualify" value="M.Tech">M.Tech
        <input type="checkbox" name="qualify" value="PhD">PhD
        <input type="checkbox" name="qualify" value="Other">Other
        <br><br>

        <label>Country:</label>
        <select id="country">
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
        </select>
        <br><br>

        <label>Date of Birth:</label>
        <input type="date" id="dob">
        <br><br>

        <label>Image:</label>
        <input type="file" id="image">
        <br><br>

        <button type="submit">Submit</button>

    </form>

    <hr>

    <h2>Submitted Details</h2>

    <div id="result"></div>

    <script src="../JS/script.js"></script>

</body>
</html>
